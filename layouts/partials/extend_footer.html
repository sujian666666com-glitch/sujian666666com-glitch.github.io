{{- /* Injects a small Three.js "earth" into the hero title on the homepage. */ -}}
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

(function () {
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const titleEl = document.querySelector('.blog-hero__title');
  if (!titleEl) return;
  if (!titleEl.textContent || titleEl.textContent.indexOf('🌍') === -1) return;
  if (titleEl.dataset.earth3dInited === '1') return;
  titleEl.dataset.earth3dInited = '1';

  // Replace the last 🌍 in the rendered HTML with a canvas wrapper.
  const earthMarkup =
    '<a class="earth-3d-wrap" href="/where/" aria-label="查看我的位置和足迹" title="查看我的位置和足迹">' +
      '<canvas class="earth-3d-canvas"></canvas>' +
    '</a>';

  const html = titleEl.innerHTML;
  const lastIdx = html.lastIndexOf('🌍');
  if (lastIdx < 0) return;
  // '🌍' is 2 UTF-16 code units in JS, so we slice accordingly.
  titleEl.innerHTML = html.slice(0, lastIdx) + earthMarkup + html.slice(lastIdx + 2);

  const wrapEl = titleEl.querySelector('.earth-3d-wrap');
  const canvasEl = titleEl.querySelector('canvas.earth-3d-canvas');
  if (!wrapEl || !canvasEl) return;

  function createEarthTexture() {
    const textureCanvas = document.createElement('canvas');
    textureCanvas.width = 512;
    textureCanvas.height = 256;
    const ctx = textureCanvas.getContext('2d');

    const ocean = ctx.createLinearGradient(0, 0, textureCanvas.width, textureCanvas.height);
    ocean.addColorStop(0, '#7dd3fc');
    ocean.addColorStop(0.45, '#2563eb');
    ocean.addColorStop(1, '#1d4ed8');
    ctx.fillStyle = ocean;
    ctx.fillRect(0, 0, textureCanvas.width, textureCanvas.height);

    ctx.fillStyle = '#8bdc37';
    ctx.strokeStyle = 'rgba(17, 52, 93, 0.35)';
    ctx.lineWidth = 4;
    const landShapes = [
      [[60, 74], [118, 50], [178, 78], [152, 126], [74, 130]],
      [[210, 106], [256, 82], [316, 108], [292, 160], [224, 154]],
      [[330, 78], [416, 60], [462, 104], [426, 144], [344, 132]],
      [[138, 154], [196, 158], [210, 210], [150, 222], [118, 190]],
      [[356, 168], [426, 164], [454, 204], [388, 224]]
    ];

    landShapes.forEach((points) => {
      ctx.beginPath();
      points.forEach(([x, y], index) => {
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });

    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#dff9ff';
    ctx.lineWidth = 2;
    for (let y = 54; y <= 202; y += 38) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.bezierCurveTo(130, y - 10, 380, y + 10, textureCanvas.width, y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    const texture = new THREE.CanvasTexture(textureCanvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;
    return texture;
  }

  function initEarth() {
    const renderer = new THREE.WebGLRenderer({
      canvas: canvasEl,
      alpha: true,
      antialias: true,
      powerPreference: 'low-power'
    });
    renderer.setClearColor(0x000000, 0);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    // 使用正交相机，彻底消除透视畸变，保证球体看起来是正圆
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
    camera.position.set(0, 0, 3.0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(2.4, 2.0, 2.5);
    scene.add(dir);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const geometry = new THREE.SphereGeometry(1, 64, 32);
    const earthMesh = new THREE.Mesh(
      geometry,
      new THREE.MeshPhongMaterial({
        map: createEarthTexture(),
        specular: 0x223344,
        shininess: 18
      })
    );
    earthGroup.add(earthMesh);

    // Simple atmosphere shell.
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.02, 64, 32),
      new THREE.MeshBasicMaterial({
        color: 0x4aa3ff,
        transparent: true,
        opacity: reduceMotion ? 0.12 : 0.18,
        side: THREE.BackSide
      })
    );
    earthGroup.add(atmosphere);

    // Resize handling: keep renderer/camera in sync with the inline canvas size.
    function resize() {
      const rect = wrapEl.getBoundingClientRect();
      const side = Math.max(1, Math.round(Math.min(rect.width, rect.height)));

      const dpr = Math.min(2, window.devicePixelRatio || 1);
      renderer.setPixelRatio(dpr);
      renderer.setSize(side, side, false);

      // 正交相机：更新 frustum 而非 aspect
      camera.left = -1;
      camera.right = 1;
      camera.top = 1;
      camera.bottom = -1;
      camera.updateProjectionMatrix();
    }
    resize();

    let lastT = performance.now();
    // 自转角速度（rad/s），适当降低以符合“慢一点”的视觉观感。
    const ROT_Y_SPEED = reduceMotion ? 0 : 0.28;
    function animate(t) {
      const dt = Math.min(0.05, (t - lastT) / 1000);
      lastT = t;

      if (!reduceMotion) {
        // Slow, constant rotation to mimic self-spin.
        earthGroup.rotation.y += dt * ROT_Y_SPEED;
      } else {
        // When reduced motion is enabled, keep it static (render one frame below).
      }

      // Subtle bob to avoid "sticker" feel.
      if (!reduceMotion) {
        earthGroup.rotation.x = Math.sin(t * 0.0003) * 0.06;
      }

      renderer.render(scene, camera);
      if (!reduceMotion) requestAnimationFrame(animate);
    }

    // Render once for reduced motion, or start loop otherwise.
    if (reduceMotion) {
      animate(performance.now());
    } else {
      requestAnimationFrame(animate);
    }

    // Best-effort resize observer: keep it sharp across responsive layouts.
    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => resize());
      ro.observe(wrapEl);
    } else {
      window.addEventListener('resize', resize, { passive: true });
    }
  }

  initEarth();
})();
</script>
