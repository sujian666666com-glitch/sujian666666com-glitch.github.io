<script>
  (function () {
    var storageKey = "site-lang";
    var legacyStorageKey = "dispatch-lang";
    var supported = { zh: true, en: true };
    var buttons = document.querySelectorAll("[data-site-lang-button], [data-dispatch-lang-button]");
    var panels = document.querySelectorAll("[data-site-lang-panel], [data-dispatch-lang-panel]");

    if (!buttons.length && !panels.length) return;

    function getSavedLang() {
      try {
        return window.localStorage.getItem(storageKey) || window.localStorage.getItem(legacyStorageKey);
      } catch (error) {
        return null;
      }
    }

    function saveLang(lang) {
      try {
        window.localStorage.setItem(storageKey, lang);
        window.localStorage.setItem(legacyStorageKey, lang);
      } catch (error) {
        return;
      }
    }

    function panelLang(panel) {
      return panel.getAttribute("data-site-lang-panel") || panel.getAttribute("data-dispatch-lang-panel");
    }

    function buttonLang(button) {
      return button.getAttribute("data-site-lang-button") || button.getAttribute("data-dispatch-lang-button");
    }

    function setLang(lang) {
      var nextLang = supported[lang] ? lang : "zh";
      document.documentElement.setAttribute("data-lang", nextLang);

      panels.forEach(function (panel) {
        panel.hidden = panelLang(panel) !== nextLang;
      });

      buttons.forEach(function (button) {
        var isActive = buttonLang(button) === nextLang;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      saveLang(nextLang);
    }

    buttons.forEach(function (button) {
      button.addEventListener("click", function () {
        setLang(buttonLang(button));
      });
    });

    setLang(getSavedLang() || "zh");
  })();
</script>

<script>
  (function () {
    var hero = document.querySelector(".dispatch-hero");
    var masthead = document.querySelector(".masthead");

    if (!hero || !masthead) return;

    function setHomeMastheadHeight() {
      var height = masthead.getBoundingClientRect().height;
      if (!height) return;
      document.documentElement.style.setProperty("--home-masthead-height", Math.ceil(height) + "px");
    }

    setHomeMastheadHeight();
    window.addEventListener("resize", setHomeMastheadHeight, { passive: true });

    if ("ResizeObserver" in window) {
      var observer = new ResizeObserver(setHomeMastheadHeight);
      observer.observe(masthead);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(setHomeMastheadHeight).catch(function () {});
    }
  })();
</script>
