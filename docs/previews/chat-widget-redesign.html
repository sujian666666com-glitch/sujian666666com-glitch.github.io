<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Widget Redesign</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    gap: 40px;
    padding: 40px;
    flex-wrap: wrap;
  }

  .label {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ===== REDESIGNED WIDGET ===== */
  .chat-panel {
    width: 360px;
    height: 620px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.06);
  }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    padding: 16px 16px 14px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
    gap: 12px;
  }

  .chat-header-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7b61ff, #3bc4c4);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .chat-header-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .chat-header-avatar-placeholder {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
  }

  .chat-header-info {
    flex: 1;
    min-width: 0;
  }

  .chat-header-name {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.2;
  }

  .chat-header-desc {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-header-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f5f5f5;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .chat-header-close:hover { background: #ebebeb; }

  /* Messages Area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #fafafa;
  }

  .chat-msg-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .chat-msg-row--user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    overflow: hidden;
  }

  .msg-avatar--bot {
    background: linear-gradient(135deg, #7b61ff, #3bc4c4);
  }

  .msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .msg-avatar--user {
    background: linear-gradient(135deg, #2563eb, #0d9488);
  }

  .msg-bubble {
    max-width: 240px;
    padding: 12px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg-bubble--bot {
    background: #fff;
    color: #1a1a2e;
    border: 1px solid #eeeeee;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .msg-bubble--user {
    background: linear-gradient(135deg, #1e293b, #334155);
    color: #fff;
    border-radius: 18px 18px 4px 18px;
  }

  /* Suggested Prompts */
  .chat-suggested {
    padding: 0 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .chat-suggested-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid #e8e8e8;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    gap: 10px;
  }

  .chat-suggested-chip:hover {
    border-color: #c0c0c0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .chip-text {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    flex: 1;
  }

  .chip-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7b61ff, #3bc4c4);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chip-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Input Area */
  .chat-input-area {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid #f0f0f0;
    gap: 10px;
    flex-shrink: 0;
    background: #fff;
  }

  .chat-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
    font-family: inherit;
    line-height: 1.4;
  }

  .chat-input::placeholder { color: #bbb; }

  .chat-send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9, #0f766e);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(14,165,233,0.3);
    color: #fff;
  }

  .chat-send-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* Bottom Toolbar: model select + think toggle */
  .chat-toolbar {
    display: flex;
    align-items: center;
    padding: 6px 16px 10px;
    gap: 10px;
    background: #fff;
    border-top: 1px solid #f0f0f0;
    flex-shrink: 0;
  }

  .toolbar-select {
    font-size: 11px;
    padding: 3px 8px;
    border: 1px solid #e0e0e0;
    border-radius: 999px;
    background: #fafafa;
    color: #555;
    cursor: pointer;
    max-width: 130px;
    outline: none;
  }

  .toolbar-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    user-select: none;
  }

  .toolbar-toggle input {
    width: 14px;
    height: 14px;
    accent-color: #0ea5e9;
  }

  .toolbar-spacer { flex: 1; }

  .toolbar-clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #bbb;
    padding: 3px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }

  .toolbar-clear-btn:hover { color: #888; }
  .toolbar-clear-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* ===== CURRENT WIDGET (for comparison) ===== */
  .chat-panel-current {
    width: 360px;
    height: 620px;
    background: rgba(15, 23, 42, 0.92);
    border-radius: 20px;
    box-shadow: 0 24px 64px rgba(2,6,23,0.4), 0 8px 20px rgba(2,6,23,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(100,116,139,0.3);
    backdrop-filter: blur(24px);
  }

  .chat-header-current {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(100,116,139,0.3);
    background: rgba(15,23,42,0.5);
    flex-shrink: 0;
  }

  .chat-header-title-current {
    font-size: 15px;
    font-weight: 700;
    color: #0ea5e9;
    letter-spacing: -0.01em;
  }

  .chat-header-actions-current {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .current-select {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid rgba(100,116,139,0.3);
    border-radius: 999px;
    background: rgba(15,23,42,0.88);
    color: rgba(241,245,249,0.96);
    max-width: 120px;
  }

  .current-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: rgba(203,213,225,0.8);
  }

  .current-toggle input {
    width: 14px;
    height: 14px;
    accent-color: #0ea5e9;
  }

  .current-btn {
    background: none;
    border: none;
    color: rgba(203,213,225,0.8);
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }

  .current-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .chat-messages-current {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: transparent;
  }

  .msg-row-c {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .msg-row-c--user { flex-direction: row-reverse; }

  .avatar-c {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
  }

  .avatar-c--bot { background: linear-gradient(135deg, #7b61ff, #3bc4c4); }
  .avatar-c--user { background: linear-gradient(135deg, #2563eb, #0d9488); }

  .bubble-c {
    max-width: 240px;
    padding: 10px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
  }

  .bubble-c--bot {
    background: rgba(39,39,42,0.92);
    color: rgba(241,245,249,0.96);
  }

  .bubble-c--user {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
  }

  .chips-current {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .chip-current {
    display: block;
    width: 100%;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(30,41,59,0.6);
    border: 1px solid rgba(100,116,139,0.26);
    color: rgba(203,213,225,0.9);
    font-size: 13px;
    text-align: left;
    cursor: pointer;
  }

  .input-area-current {
    display: flex;
    align-items: flex-end;
    padding: 12px 16px;
    border-top: 1px solid rgba(100,116,139,0.3);
    gap: 10px;
    flex-shrink: 0;
    background: rgba(15,23,42,0.4);
  }

  .input-current {
    flex: 1;
    border: 1px solid rgba(100,116,139,0.3);
    border-radius: 16px;
    padding: 10px 14px;
    font-size: 14px;
    background: rgba(15,23,42,0.88);
    color: rgba(241,245,249,0.96);
    font-family: inherit;
    resize: none;
    min-height: 40px;
    outline: none;
  }

  .input-current::placeholder { color: rgba(203,213,225,0.5); }

  .send-btn-current {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0ea5e9, #0f766e);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(14,165,233,0.3);
  }

  .send-btn-current svg { width: 18px; height: 18px; fill: currentColor; }

  /* Annotations */
  .annotation {
    position: relative;
  }

  .annotation-badge {
    position: absolute;
    background: #ef4444;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 10;
  }

  .annotation-badge.green { background: #22c55e; }

  .wrapper { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="label">当前样式</div>
  <div class="chat-panel-current annotation" id="current">
    <!-- Header -->
    <div class="chat-header-current">
      <span class="chat-header-title-current">AI 助手</span>
      <div class="chat-header-actions-current">
        <select class="current-select"><option>Qwen 3.6 Plus</option></select>
        <label class="current-toggle">
          <input type="checkbox"> 思考
        </label>
        <button class="current-btn">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
        <button class="current-btn">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages-current">
      <div class="msg-row-c">
        <div class="avatar-c avatar-c--bot">兴</div>
        <div class="bubble-c bubble-c--bot">
          您好！我是本博客的阅读助手，很高兴为您服务。
        </div>
      </div>
      <div class="msg-row-c msg-row-c--user">
        <div class="avatar-c avatar-c--user">我</div>
        <div class="bubble-c bubble-c--user">你好</div>
      </div>
      <div class="msg-row-c">
        <div class="avatar-c avatar-c--bot">兴</div>
        <div class="bubble-c bubble-c--bot">
          你好！请问有什么可以帮助你的？
        </div>
      </div>
    </div>

    <!-- Chips -->
    <div class="chips-current">
      <button class="chip-current">什么是 GEO？它和以前做的 SEO 有什么区别？</button>
      <button class="chip-current">你们的系统到底能帮我做什么？</button>
      <button class="chip-current">这个优化做完之后，多久能看到效果？</button>
    </div>

    <!-- Input -->
    <div class="input-area-current">
      <textarea class="input-current" placeholder="输入你的问题，按 Enter 发送，Shift+Enter 换行" rows="1"></textarea>
      <button class="send-btn-current">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="wrapper">
  <div class="label">优化后样式（参考设计）</div>
  <div class="chat-panel annotation" id="redesign">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-avatar">
        <span class="chat-header-avatar-placeholder">兴</span>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name">兴旺 AI 助手</div>
        <div class="chat-header-desc">为你解答博客内容相关问题</div>
      </div>
      <button class="chat-header-close">✕</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages">
      <div class="chat-msg-row">
        <div class="msg-avatar msg-avatar--bot">兴</div>
        <div class="msg-bubble msg-bubble--bot">
          您好！我是本博客的阅读助手，很高兴为您服务。请问您想咨询什么相关问题？
        </div>
      </div>
      <div class="chat-msg-row chat-msg-row--user">
        <div class="msg-avatar msg-avatar--user">我</div>
        <div class="msg-bubble msg-bubble--user">你好</div>
      </div>
      <div class="chat-msg-row">
        <div class="msg-avatar msg-avatar--bot">兴</div>
        <div class="msg-bubble msg-bubble--bot">
          你好！请问有什么可以帮助你的？
        </div>
      </div>
    </div>

    <!-- Suggested Prompts -->
    <div class="chat-suggested">
      <button class="chat-suggested-chip">
        <span class="chip-text">什么是 GEO？它和以前做的 SEO 有什么区别？</span>
        <div class="chip-avatar"><span style="color:#fff;font-size:11px;font-weight:600;">兴</span></div>
      </button>
      <button class="chat-suggested-chip">
        <span class="chip-text">这个博客主要写什么内容？</span>
        <div class="chip-avatar"><span style="color:#fff;font-size:11px;font-weight:600;">兴</span></div>
      </button>
      <button class="chat-suggested-chip">
        <span class="chip-text">有哪些关于 AI 的文章推荐？</span>
        <div class="chip-avatar"><span style="color:#fff;font-size:11px;font-weight:600;">兴</span></div>
      </button>
      <button class="chat-suggested-chip">
        <span class="chip-text">合作流程是怎样的？我需要提供什么素材？</span>
        <div class="chip-avatar"><span style="color:#fff;font-size:11px;font-weight:600;">兴</span></div>
      </button>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <input class="chat-input" type="text" placeholder="输入你的问题，按 Enter 发送，Shift+Enter 换行">
      <button class="chat-send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <!-- Bottom Toolbar -->
    <div class="chat-toolbar">
      <select class="toolbar-select"><option>Qwen 3.6 Plus</option></select>
      <label class="toolbar-toggle">
        <input type="checkbox"> 思考模式
      </label>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-clear-btn">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
  </div>
</div>

</body>
</html>
