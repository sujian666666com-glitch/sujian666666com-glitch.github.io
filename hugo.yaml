baseURL: https://sujian.online/
languageCode: zh-cn
title: "Jian の Blog"
theme: PaperMod

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML

params:
  env: production
  defaultTheme: light
  author: "苏健"
  description: "AI 工程师 | 记录技术、生活与思考"
  masthead:
    issue: "VOL. I · NO. 06"
    dateline: "Tuesday, the 2nd of June"
    datelineZh: "2026年6月2日，星期二"
    datelineEn: "Tuesday, the 2nd of June"
    dispatch:
      zh:
        label: "A PERSONAL DISPATCH"
        title:
          - "把问题拆开，"
          - "把系统建起，"
          - "把生活继续"
        primaryCta: "浏览文章 →"
        secondaryCta: "关于我"
        proofAria: "最新文章"
        dateLabel: "日期"
        categoryLabel: "分类"
        readLabel: "阅读"
        wordsLabel: "字数"
        readArticle: "阅读全文"
        fallbackTitle: "新的 dispatch 正在整理中"
        fallbackSummary: "等第一篇文章发布后，这里会自动呈现最新内容的日期、分类、阅读时间和摘要。"
      en:
        label: "A PERSONAL DISPATCH"
        title:
          - "Break the problem down,"
          - "Build the system up,"
          - "Keep life moving."
        primaryCta: "Read Notes →"
        secondaryCta: "About"
        proofAria: "Latest article"
        dateLabel: "Date"
        categoryLabel: "Category"
        readLabel: "Read"
        wordsLabel: "Words"
        readArticle: "Read Article"
        fallbackTitle: "A new dispatch is being drafted"
        fallbackSummary: "Once the first article is published, this card will show its date, category, reading time, and summary."

  # Profile 模式 - 极简设计
  profileMode:
    enabled: true
    title: "Hello World 🌍"
    subtitle: ""
    imageUrl: ""
    imageTitle: ""
    imageWidth: 0
    imageHeight: 0
    buttons: []

  socialIcons:
    - name: github
      url: "https://github.com/"
    - name: email
      url: "mailto:1917980791@qq.com"
    - name: rss
      url: "/index.xml"

  # 文章展示
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true

  # 首页文章列表
  mainSections:
    - posts

  # 主题色
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"

  # 聊天组件
  chat:
    proxyURL: "https://sujian.online/api/chat" # VPS Node 聊天代理；也可用 HUGO_CHAT_PROXY_URL 覆盖
    proxyFallbackURL: ""

  # 匿名留言墙
  messageWall:
    apiURL: "https://sujian.online" # GitHub Pages 无动态 API，留言墙统一请求 VPS；也可用 HUGO_WALL_API_URL 覆盖

