# 放入 sujian.online 对应 server 块内，让 Life Map Next 子应用挂载到 /about/life-map。
#
# Next 服务建议监听：
#   127.0.0.1:8790
#
# 注意：/_next/ 是 Next 静态资源路径，必须反代到同一服务。

location = /about/life-map {
    proxy_pass http://127.0.0.1:8790/about/life-map;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /about/life-map/ {
    proxy_pass http://127.0.0.1:8790/about/life-map/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/life-map/ {
    # 建议在 server/http 块中配合 limit_req_zone 对该路径做 per-IP 限速，
    # 尤其是 /api/life-map/verify 密码验证入口。
    proxy_pass http://127.0.0.1:8790/api/life-map/;
    proxy_http_version 1.1;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
    add_header Cache-Control "no-store, private" always;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /_next/ {
    proxy_pass http://127.0.0.1:8790/_next/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
