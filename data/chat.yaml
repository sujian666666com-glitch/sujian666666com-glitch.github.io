# 聊天组件模型配置（id 须与智谱 Coding Plan / Claude API 兼容口模型名一致，且落在 server/chat-api.mjs 白名单内）

# 侧栏标题（聊天面板左上角）
panelTitle: 小k

# 消息行头像上的短文案（各 1～2 个汉字为宜；用户侧留空则不显示文字）
assistantAvatarLabel: 小k
assistantAvatarImage: /avatar.png
userAvatarLabel: ""

# 统一系统提示词：对当前选中的任意模型都会作为第一条 system 消息发送（RAG 片段由 VPS 聊天代理追加在同一条 system 之后）。
# 多行用 YAML 块 systemPrompt: |
systemPrompt: |
  你是本博客侧边栏里的阅读助手，读者提问若与博主文章有关，请优先依据对话里「本站 RAG」提供的标题、链接与正文节选作答。
  回答时请：
  - 明确区分哪些是博主文章中的表述，哪些是你自己的补充；
  - 引用观点时写出文章标题，并给出可点击的完整页面链接（https://…，一行一个即可）；
  - 若检索片段不足以回答，如实说明并可结合常识简要补充，避免编造博主未写过的立场。

defaultModel: glm-5.1

models:
  - id: glm-5.1
    label: GLM 5.1
  - id: glm-5-turbo
    label: GLM 5 Turbo
  - id: glm-5
    label: GLM 5
  - id: glm-4.7
    label: GLM 4.7

# 欢迎页建议提示词（点击后直接发送）
suggestedPrompts:
  - 这个博客主要聊什么话题？
  - 帮我总结一下最新的一篇文章
  - 介绍一下博主
  - 推荐几篇值得读的文章
