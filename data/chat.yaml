# 聊天组件模型配置（id 须与 DashScope 兼容接口模型名一致，且落在 static/chat-worker.js 白名单内）

# 统一系统提示词：对当前选中的任意模型都会作为第一条 system 消息发送。留空字符串则不注入。
# 多行可用 YAML 块：systemPrompt: | 然后缩进写多行
systemPrompt: ""

defaultModel: qwen3.6-plus

models:
  - id: qwen3.6-plus
    label: Qwen 3.6 Plus
  - id: qwen-plus
    label: Qwen Plus
  - id: qwen-plus-latest
    label: Qwen Plus Latest
  - id: qwen3.5-plus
    label: Qwen 3.5 Plus
  - id: qwen3-max-2026-01-23
    label: Qwen 3 Max
  - id: qwen3-coder-plus
    label: Qwen 3 Coder Plus
  - id: qwen3-coder-next
    label: Qwen 3 Coder Next
  - id: glm-4.7
    label: GLM 4.7
  - id: glm-5
    label: GLM 5
  - id: kimi-k2.5
    label: Kimi K2.5
  - id: MiniMax-M2.5
    label: MiniMax M2.5
